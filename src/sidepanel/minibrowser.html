<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BrowseLens Mini Browser Sandbox</title>
  <style>
    :root {
      --bg-primary: #0a0e14;
      --bg-secondary: #111720;
      --bg-tertiary: #1a2030;
      --bg-hover: #1e2840;
      --bg-active: #243050;
      --bg-card: #141a26;
      --border-primary: #1e2a3a;
      --border-secondary: #2a3a50;
      --text-primary: #e4e8f0;
      --text-secondary: #8899aa;
      --text-muted: #556677;
      --accent-cyan: #00e5ff;
      --accent-green: #00ff88;
      --accent-red: #ff4060;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* Control Bar */
    .control-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      flex-shrink: 0;
    }
    .btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-secondary);
      color: var(--text-primary);
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      font-weight: bold;
      outline: none;
    }
    .btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }
    .address-bar {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }
    .address-input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-secondary);
      color: var(--accent-cyan);
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .address-input:focus {
      border-color: var(--accent-cyan);
    }
    /* Iframe Area */
    .frame-container {
      flex: 1;
      width: 100%;
      height: 100%;
      position: relative;
      background: #fff;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="control-bar">
    <button class="btn" id="btn-back" title="Back">◀</button>
    <button class="btn" id="btn-forward" title="Forward">▶</button>
    <button class="btn" id="btn-reload" title="Reload">⟳</button>
    <div class="address-bar">
      <input type="text" class="address-input" id="address-input" placeholder="Enter URL starting with http:// or https://..." />
    </div>
    <button class="btn" id="btn-repeater" style="background: rgba(0, 229, 255, 0.1); border-color: rgba(0, 229, 255, 0.3); color: var(--accent-cyan);" title="Send current URL to Repeater">🚀 Send to Repeater</button>
  </div>
  <div class="frame-container">
    <iframe id="mini-iframe" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
  </div>

  <script type="module" src="minibrowser.ts"></script>
</body>
</html>
